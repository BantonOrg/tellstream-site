<html lang="en">

        body {

            background-size: cover;
            color: #fff;
            min-height: 100vh;
            padding: 40px 20px;

        .board-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .board-header {
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 173, 181, 0.3);
        }
        .board-header h1 { color: #00adb5; font-size: 2rem; margin-bottom: 5px; }
        .board-header p { color: #aaa; font-size: 0.9rem; }
        
        .columns-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .notice-col {
            background: rgba(25, 25, 25, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            height: 650px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

            text-align: center;

            color: #00adb5;
            background: rgba(30,30,30,0.5);
        }
