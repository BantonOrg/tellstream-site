<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellstream - Big John Live</title>
    
    <meta property="og:title" content="Tellstream - Big John Live">
    <meta property="og:description" content="Join the Listener Lounge, check out live event flyers, and stream music on Tellstream.">
    <meta property="og:image" content="/src/assets/ogmetaLOGO.jpg">
    <meta property="og:url" content="https://tellstream.banton.org">
    <meta property="og:type" content="website">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: url('/src/assets/sitebg1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .player-card {
            background-image: url('/src/assets/header-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 140px;
            padding: 0px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }
        
        .player-card h1 {
            color: #00adb5;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
            font-size: 1.8rem;
            white-space: nowrap;
        }
        
        .columns-container {
            flex: 1;
            display: flex;
            gap: 20px;
            overflow: hidden;
        }
        
        .col-3 {
            flex: 1;
            background: rgba(25, 25, 25, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        
        .col-title {
            font-size: 1.1rem;
            color: #00adb5;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .fb-master-link, .emoji-master-link {
            font-size: 0.75rem;
            background: #1877f2;
            color: white;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .fb-master-link:hover {
            background: #166fe5;
        }
        
        .emoji-master-link {
            background: #00adb5;
        }
        .emoji-master-link:hover {
            background: #008c94;
        }

        .inner-feed-wrapper {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Column 1 items */
        .fb-post-card {
            background: rgba(45, 45, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .fb-post-card:hover {
            transform: scale(1.01);
            background: rgba(24, 119, 242, 0.1);
            border-color: rgba(24, 119, 242, 0.4);
        }
        .fb-post-meta {
            font-size: 0.75rem;
            color: #00adb5;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .fb-post-text {
            font-size: 0.85rem;
            color: #eee;
            line-height: 1.4;
        }

        /* Column 2 items */
        .flyer-item {
            background: rgba(45, 45, 45, 0.5);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .flyer-item:hover {
            transform: scale(1.02);
            background: rgba(60, 60, 60, 0.7);
        }
        .flyer-item img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }
        .flyer-item h4 {
            margin-top: 8px; 
            font-size: 0.95rem; 
            color: #ffffff;
        }

        /* Column 3 items */
        .sub-panel-top, .sub-panel-bottom {
            flex: 1;
            overflow-y: auto;
            background: rgba(20, 20, 20, 0.4);
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .help-item-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #00adb5;
        }
        .help-item-card h5 {
            font-size: 0.85rem;
            color: #ffffff;
            margin-bottom: 3px;
        }
        .help-item-card p {
            font-size: 0.8rem;
            color: #ccc;
            line-height: 1.3;
        }

        .emoji-grid-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .emoji-grid-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .emoji-grid-item:hover {
            background: rgba(0, 173, 181, 0.2);
            border-color: #00adb5;
        }
        
        /* Master Sidebar */
        .chat-sidebar {
            width: 380px;
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(45, 45, 45, 0.5);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .chat-header {
            padding: 20px;
            background: rgba(30, 30, 30, 0.8);
            border-bottom: 1px solid rgba(45, 45, 45, 0.5);
            font-weight: bold;
            font-size: 1.2rem;
            color: #00adb5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: none;
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
        }
        .fullscreen-btn:hover {
            background: #00adb5;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            background: rgba(36, 36, 36, 0.85);
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .msg .user {
            font-weight: bold;
            color: #00adb5;
            margin-bottom: 3px;
            font-size: 0.9rem;
        }
        
        .chat-input-area {
            padding: 15px;
            background: rgba(30, 30, 30, 0.9);
            border-top: 1px solid rgba(45, 45, 45, 0.5);
            display: flex; 
            gap: 10px;
        }
        
        .chat-input-area input {
            flex: 1;
            background: #2d2d2d;
            border: none;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            outline: none;
        }
        
        .chat-input-area button {
            background: #00adb5;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .chat-input-area button:hover {
            background: #008c94;
        }

        body.chat-is-fullscreen .main-content {
            display: none !important;
        }
        body.chat-is-fullscreen .chat-sidebar {
            width: 100% !important;
            border-left: none;
        }

        /* Lightbox Overlay */
        .flyer-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s ease;
        }
        .flyer-modal-overlay.active {
            display: flex;
            opacity: 1;
        }
        .modal-content-card {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }
        .modal-content-card img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .modal-close-btn {
            position: absolute;
            top: -40px;
            right: 0;
            background: #00adb5;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-close-btn:hover {
            background: #008c94;
        }

        @media (max-width: 1024px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }
            body.chat-is-fullscreen .main-content {
                display: none !important;
            }
            .main-content {
                height: auto;
                overflow: visible;
                padding: 10px;
            }
            .player-card {
                height: auto;
                flex-direction: column;
                padding: 20px;
                text-align: center;
            }
            .columns-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }
            .col-3 {
                height: 500px;
                flex-shrink: 0;
            }
            .chat-sidebar {
                width: 100% !important;
                height: 600px;
                border-left: none;
                border-top: 1px solid #2d2d2d;
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="player-card">
            <h1>BIG JOHN LIVE</h1>
            <audio id="radioPlayer" src="https://a3.asurahosting.com/listen/tellstream/radio.mp3" controls preload="auto" style="width: 100%; max-width: 320px; margin: 0; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.6); border-radius: 8px;">
                Your browser does not support the audio element.
            </audio>
        </div>
        
        <div class="columns-container">
            
            <div class="col-3">
                <div class="col-title">
                    <span>📘 Facebook Activity</span>
                    <a href="https://www.facebook.com/tellstream.dem" target="_blank" class="fb-master-link">Open Full Page</a>
                </div>
                <div class="inner-feed-wrapper" id="fbFeedContainer"></div>
            </div>
            
            <div class="col-3">
                <div class="col-title">🔥 Live Events & Adverts</div>
                <div class="inner-feed-wrapper" id="flyerContainer"></div>
            </div>
            
            <div class="col-3">
                <div class="col-title">💡 System Help & Shorthands</div>
                <div class="sub-panel-top" id="helpCardsContainer"></div>
                <div class="sub-panel-bottom">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                        <span style="font-size:0.85rem; color:#00adb5; font-weight:bold;">✨ Quick Emojis</span>
                        <a href="https://tellstream-emojis.pages.dev/" target="_blank" class="emoji-master-link">See All Codes</a>
                    </div>
                    <div class="emoji-grid-list" id="quickEmojiList"></div>
                </div>
            </div>

        </div>
    </div>

    <div class="chat-sidebar">
        <div class="chat-header">
            <span>🔊 Listener Lounge</span>
            <button class="fullscreen-btn" id="fsToggleBtn" onclick="toggleChatFullscreen()">Maximize Chat</button>
        </div>
        <div class="chat-messages" id="chatBox"></div>
        
        <div class="chat-input-area">
            <input type="text" id="usernameInput" placeholder="Nickname" style="width: 80px; flex: none;">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <div class="flyer-modal-overlay" id="flyerModal" onclick="closeFlyerLightbox()">
        <div class="modal-content-card" onclick="event.stopPropagation();">
            <button class="modal-close-btn" onclick="closeFlyerLightbox()">Close (X)</button>
            <img id="modalTargetImg" src="" alt="Expanded View Asset">
        </div>
    </div>

    <script src="/src/assets/emojis.js"></script>

    <script>
        const SUPABASE_URL = "https://vegwferwmyuunwvfqpsf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZ3dmZXJ3bXl1dW53dmZxcHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODU5NDQsImV4cCI6MjA5Nzk2MTk0NH0.7F3HUEY59BGE5phlD9AukhZzRa3Ied_ZT43j8YZeIy8";
        const supabase_db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const chatBox = document.getElementById('chatBox');
        const usernameInput = document.getElementById('usernameInput');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const audioPlayer = document.getElementById('radioPlayer');
        const flyerContainer = document.getElementById('flyerContainer');
        const quickEmojiList = document.getElementById('quickEmojiList');
        const fbFeedContainer = document.getElementById('fbFeedContainer');
        const helpCardsContainer = document.getElementById('helpCardsContainer');
        const fsToggleBtn = document.getElementById('fsToggleBtn');
        const flyerModal = document.getElementById('flyerModal');
        const modalTargetImg = document.getElementById('modalTargetImg');

        const imgBaseUrl = "https://tellstream-emojis.pages.dev/";

        const facebookPosts = [
            { id: 1, date: "Just now", text: "Big John is locked and loaded live in the studio! Lock into tellstream.banton.org right now and fire up the lounge chat! 🎚️🔥", link: "https://www.facebook.com/tellstream.dem" },
            { id: 2, date: "Yesterday", text: "Big respect to all the listeners locking in from around the globe. Drop your shoutouts and tell-a-wheel selectors directly inside the main chat line! 🔊🎧", link: "https://www.facebook.com/tellstream.dem" },
            { id: 3, date: "2 days ago", text: "Weekend scheduling updates coming soon. Keep your locked eyes locked onto the central flyer board for upcoming live dance clashes.", link: "https://www.facebook.com/tellstream.dem" }
        ];

        const eventFlyers = [
            { id: 1, title: "Big John Summer Bash", img: "/src/assets/flyer1.jpg", danceDate: "2026-07-15" },
            { id: 2, title: "Tellstream Linkup Dub Clash", img: "/src/assets/flyer1.jpg", danceDate: "2026-05-01" },
            { id: 3, title: "Weekend Showcase Spec", img: "/src/assets/flyer1.jpg", danceDate: "2026-08-30" }
        ];

        const helpInstructions = [
            { title: "Setting Nickname", text: "Fill in the Nickname block before typing to claim your handle in the Lounge panel." },
            { title: "Sending Text Lines", text: "Type your query inside the input field box and tap Send or hit your keyboard Enter button." },
            { title: "Firing Emojis & Sounds", text: "Tap any active shorthand key code block inside the selection layout panel below to append it to your message." }
        ];

        function renderFacebookFeed() {
            fbFeedContainer.innerHTML = facebookPosts.map(post => `
                <div class="fb-post-card" onclick="window.open('${post.link}', '_blank');">
                    <div class="fb-post-meta">Tellstream Page • ${post.date}</div>
                    <div class="fb-post-text">${post.text}</div>
                </div>
            `).join('');
        }

        function renderActiveFlyers() {
            const today = new Date();
            today.setHours(0,0,0,0);

            const activeCards = eventFlyers.filter(event => {
                const expirationDate = new Date(event.danceDate);
                return expirationDate >= today;
            });

            if(activeCards.length === 0) {
                flyerContainer.innerHTML = `<p style="color:#666; text-align:center; padding-top:20px;">No current event flyers listed.</p>`;
                return;
            }

            flyerContainer.innerHTML = activeCards.map(event => `
                <div class="flyer-item" onclick="launchFlyerLightbox('${event.img}')">
                    <img src="${event.img}" alt="${event.title}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2250%22><rect width=%22100%25%22 height=%22100%25%22 fill=%22%23333%22/><text x=%2210%22 y=%2230%22 fill=%22%23aaa%22 font-size=%2212%22>Missing Asset</text></svg>'">
                    <h4>${event.title}</h4>
                    <p style="font-size:0.75rem; color:#aaa; margin-top:4px;">Date: ${event.danceDate}</p>
                </div>
            `).join('');
        }

        function renderHelpContent() {
            helpCardsContainer.innerHTML = helpInstructions.map(item => `
                <div class="help-item-card">
                    <h5>${item.title}</h5>
                    <p>${item.text}</p>
                </div>
            `).join('');
        }

        function launchFlyerLightbox(imgSrc) {
            modalTargetImg.src = imgSrc;
            flyerModal.classList.add('active');
        }
        function closeFlyerLightbox() {
            flyerModal.classList.remove('active');
            modalTargetImg.src = "";
        }

        function toggleChatFullscreen() {
            const isFullscreen = document.body.classList.toggle('chat-is-fullscreen');
            fsToggleBtn.innerText = isFullscreen ? "Exit Fullscreen" : "Maximize Chat";
        }

        function initQuickEmojiCloud() {
            if (!window.emojiMapping) return;
            const items = Object.keys(window.emojiMapping);
            quickEmojiList.innerHTML = items.slice(0, 32).map(key => `
                <div class="emoji-grid-item" onclick="insertEmojiCode('${key}')">:${key}:</div>
            `).join('');
        }

        function insertEmojiCode(code) {
            messageInput.value += ` :${code}: `;
            messageInput.focus();
        }

        audioPlayer.addEventListener('stalled', () => { recoverStream(); });
        audioPlayer.addEventListener('error', () => { recoverStream(); });

        function recoverStream() {
            const currentSrc = audioPlayer.src;
            if (!currentSrc) return;
            audioPlayer.src = "";
            audioPlayer.load();
            audioPlayer.src = currentSrc;
            audioPlayer.play().catch(err => console.log(err));
        }

        function appendMessage(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            
            let messageContent = escapeHTML(data.message);

            const codeRegex = /:([a-zA-Z0-9_-]+):/g;
            messageContent = messageContent.replace(codeRegex, (match, code) => {
                const lowerCode = code.toLowerCase();
                if (window.emojiMapping && window.emojiMapping[lowerCode]) {
                    return `<img src="${imgBaseUrl}${window.emojiMapping[lowerCode]}" alt="${code}" style="max-height: 48px; vertical-align: middle; margin: 2px; border-radius: 4px;">`;
                }
                return match;
            });

            msgDiv.innerHTML = `<div class="user">${escapeHTML(data.username)}</div><div>${messageContent}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            while (chatBox.children.length > 50) {
                chatBox.removeChild(chatBox.firstChild);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        async function loadMessages() {
            const { data } = await supabase_db.from('messages').select('*').order('id', { ascending: true }).limit(40);
            if (data) data.forEach(appendMessage);
        }

        supabase_db.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', pattern: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new);
            }).subscribe();

        async function sendMessage() {
            const user = usernameInput.value.trim() || 'Listener';
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            await supabase_db.from('messages').insert([{ username: user, message: text }]);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        renderFacebookFeed();
        renderActiveFlyers();
        renderHelpContent();
        setTimeout(initQuickEmojiCloud, 500);
        loadMessages();
    </script>
</body>
</html>
