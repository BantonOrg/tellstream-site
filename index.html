<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellstream - Big John Live</title>
    
    <meta property="og:title" content="Tellstream - Big John Live">
    <meta property="og:description" content="Join the Listener Lounge, check out live event flyers, and stream music on Tellstream.">
    <meta property="og:image" content="/src/assets/ogmetaLOGO.jpg">
    <meta property="og:url" content="https://tellstream.banton.org">
    <meta property="og:type" content="website">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: url('/src/assets/sitebg1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .player-card {
            background-image: url('/src/assets/header-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 140px;
            padding: 0px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }
        
        .player-card h1 {
            color: #00adb5;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
            font-size: 1.8rem;
            white-space: nowrap;
        }
        
        .columns-container {
            flex: 1;
            display: flex;
            gap: 20px;
            overflow: hidden;
        }
        
        .col-3 {
            flex: 1;
            background: rgba(25, 25, 25, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        
        .col-title {
            font-size: 1.1rem;
            color: #00adb5;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .fb-master-link, .emoji-master-link {
            font-size: 0.75rem;
            background: #1877f2;
            color: white;
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        .fb-master-link:hover {
            background: #166fe5;
        }
        
        .emoji-master-link {
            background: #00adb5;
        }
        .emoji-master-link:hover {
            background: #008c94;
        }

        .inner-feed-wrapper {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Column 1 items */
        .fb-post-card {
            background: rgba(45, 45, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .fb-post-card:hover {
            transform: scale(1.01);
            background: rgba(24, 119, 242, 0.1);
            border-color: rgba(24, 119, 242, 0.4);
        }
        .fb-post-meta {
            font-size: 0.75rem;
            color: #00adb5;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .fb-post-text {
            font-size: 0.85rem;
            color: #eee;
            line-height: 1.4;
        }

        /* Column 2 items */
        .flyer-item {
            background: rgba(45, 45, 45, 0.5);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .flyer-item:hover {
            transform: scale(1.02);
            background: rgba(60, 60, 60, 0.7);
        }
        .flyer-item img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
        }
        .flyer-item h4 {
            margin-top: 8px; 
            font-size: 0.95rem; 
            color: #ffffff;
        }

        /* Column 3 items */
        .sub-panel-top, .sub-panel-bottom {
            flex: 1;
            overflow-y: auto;
            background: rgba(20, 20, 20, 0.4);
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .help-item-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 3px solid #00adb5;
        }
        .help-item-card h5 {
            font-size: 0.85rem;
            color: #ffffff;
            margin-bottom: 3px;
        }
        .help-item-card p {
            font-size: 0.8rem;
            color: #ccc;
            line-height: 1.3;
        }

        .emoji-grid-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .emoji-grid-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .emoji-grid-item:hover {
            background: rgba(0, 173, 181, 0.2);
            border-color: #00adb5;
        }
        
        /* Master Sidebar */
        .chat-sidebar {
            width: 380px;
            background: rgba(20, 20, 20, 0.96);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(45, 45, 45, 0.5);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .chat-header {
            padding: 20px;
            background: rgba(30, 30, 30, 0.8);
            border-bottom: 1px solid rgba(45, 45, 45, 0.5);
            font-weight: bold;
            font-size: 1.2rem;
            color: #00adb5;
