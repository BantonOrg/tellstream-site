        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #121212; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        .main-content { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 20px; }
        .player-card { background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .player-card h1 { color: #ff0055; margin-bottom: 15px; }
        .fb-feed { flex: 1; background: #1e1e1e; border-radius: 12px; padding: 15px; overflow-y: auto; }
        .chat-sidebar { width: 380px; background: #181818; border-left: 1px solid #2d2d2d; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; background: #1e1e1e; border-bottom: 1px solid #2d2d2d; font-weight: bold; font-size: 1.2rem; color: #ff0055; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        
        /* Scrollable Emoji Grid Menu Container */
        .emoji-panel-container {
            background: #151515;
            border-top: 1px solid #2d2d2d;
            padding: 10px;
            max-height: 140px;
            overflow-y: auto;
        }
        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(36px, 1fr));
            gap: 8px;
        }
        .emoji-grid img {
            width: 100%;
            height: 32px;
            object-fit: contain;
            cursor: pointer;
            border-radius: 4px;
            transition: transform 0.1s ease, background 0.1s;
        }
        .emoji-grid img:hover {
            transform: scale(1.2);
            background: #2d2d2d;
        }
        .emoji-panel-container::-webkit-scrollbar { width: 6px; }
        .emoji-panel-container::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .msg { background: #242424; padding: 10px 14px; border-radius: 8px; line-height: 1.4; max-width: 90%; }
        .msg .user { font-weight: bold; color: #00adb5; margin-bottom: 3px; font-size: 0.9rem; }
        .chat-input-area { padding: 15px; background: #1e1e1e; border-top: 1px solid #2d2d2d; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; background: #2d2d2d; border: none; padding: 12px; border-radius: 6px; color: #fff; outline: none; }
        .chat-input-area button { background: #ff0055; border: none; color: white; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .chat-input-area button:hover { background: #e0004c; }
    </style>
