        body {

            color: #fff; 
            display: flex; 
            height: 100vh;

        }
        
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            gap: 20px; 
        }
                
        /* Card background layout with smooth rounded corners */
        .player-card { 
            background-image: url('/src/assets/header-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            overflow: hidden;
            
            /* Fixed: Flex layout to handle aligning title left and player right */
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
                
        .player-card h1 { 
            color: #ff0055; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.8); 
            text-align: left;
        }
        
        .fb-feed { 
            flex: 1; 
            background: #1e1e1e; 
            border-radius: 12px; 
            padding: 15px; 
            overflow-y: auto; 
        }
        
        .chat-sidebar { 
            width: 380px; 
            background: #181818; 
            border-left: 1px solid #2d2d2d; 
            display: flex; 
            flex-direction: column; 
        }
        
        .chat-header { 
            padding: 20px; 
            background: #1e1e1e; 
            border-bottom: 1px solid #2d2d2d; 
            font-weight: bold; 
            font-size: 1.2rem; 
            color: #ff0055; 
        }
        
        .chat-messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
                
        .msg { 
            background: #242424; 
            padding: 10px 14px; 
            border-radius: 8px; 
            line-height: 1.4; 
            max-width: 90%; 
        }
        
        .msg .user { 
            font-weight: bold; 
            color: #00adb5; 
            margin-bottom: 3px; 
            font-size: 0.9rem; 
        }
        
        .chat-input-area { 
            padding: 15px; 
            background: #1e1e1e; 
            border-top: 1px solid #2d2d2d; 
            display: flex; 
            gap: 10px; 
        }
        
        .chat-input-area input { 
            flex: 1; 
            background: #2d2d2d; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            color: #fff; 
            outline: none; 
        }
        
        .chat-input-area button { 
            background: #ff0055; 
            border: none; 
            color: white; 
            padding: 0 20px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        
        .chat-input-area button:hover { 
            background: #e0004c; 
        }
    </style>
