<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellstream - Live Lounge</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background: url('/src/assets/sitebg1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* Top Header System */
        header {
            background: rgba(20, 20, 20, 0.95);
            border-bottom: 2px solid #00adb5;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            height: 90px;
        }
        .header-left { display: flex; flex-direction: column; }
        .header-left h1 { font-size: 1.3rem; color: #00adb5; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; font-weight: 900; }
        .header-left p { font-size: 0.85rem; color: #eee; font-weight: bold; letter-spacing: 1px; }
        .player-controls audio { outline: none; width: 320px; height: 36px; }

        /* Main Workspace App Layout Grid */
        .main-content {
            display: flex;
            flex: 1;
            height: calc(100vh - 90px);
            position: relative;
        }

        /* Left Side Content Area (Grid Layout matching your layout cards) */
        .left-content-area {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            overflow-y: auto;
        }
        .info-card {
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* Right Side: Dual-Mode Interactive Sidebar Panel */
        .sidebar-panel {
            width: 420px;
            background: rgba(15, 15, 15, 0.92);
            border-left: 1px solid rgba(0, 173, 181, 0.2);
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 5;
        }

        /* Sidebar Window Control Nav Bars */
        .sidebar-header {
            background: rgba(25, 25, 25, 0.95);
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-title { font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #00adb5; }
        .nav-controls { display: flex; gap: 8px; align-items: center; }
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: #00adb5; border-color: #00adb5; color: #000; }
        #toggle-notice-btn { background: rgba(0, 173, 181, 0.1); border-color: rgba(0, 173, 181, 0.3); color: #00adb5; }

        /* Mode View Containers */
        .view-container { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        #noticeboard-view { display: none; background: #121212; }

        /* LIVE CHAT VIEW COMPONENTS */
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { font-size: 0.9rem; line-height: 1.4; word-break: break-word; background: rgba(255,255,255,0.02); padding: 6px 10px; border-radius: 4px; }
        .author-admin { color: #ff4a4a; font-weight: bold; }
        .author-registered { color: #ffdd57; font-weight: bold; }
        .author-unregistered { color: #23d160; font-weight: bold; }
        .chat-input-area { padding: 15px; background: rgba(20,20,20,0.8); border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; background: #222; border: 1px solid #444; padding: 10px; color: #fff; border-radius: 4px; outline: none; }
        .chat-input-area input:focus { border-color: #00adb5; }

        /* NOTICEBOARD GRID VIEW COMPONENTS */
        .notice-columns-wrapper { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 15px; }
        .notice-column { background: #181818; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; padding: 10px; min-height: 160px; }
        .col-boss { border-top: 3px solid #ff4a4a; }
        .col-selectors { border-top: 3px solid #ffdd57; }
        .col-fambily { border-top: 3px solid #23d160; }
        .column-header { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .notice-feed { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; margin-bottom: 8px; }
        .notice-card { background: rgba(255,255,255,0.02); padding: 8px; border-radius: 4px; font-size: 0.85rem; border-left: 2px solid rgba(255,255,255,0.2); }
        
        /* Notice Board Inputs */
        .notice-input-form { display: none; margin-top: auto; padding-top: 5px; }
        .notice-form-row { display: flex; gap: 6px; }
        .notice-form-row input { flex: 1; background: #252525; border: 1px solid #444; padding: 6px 10px; color: #fff; font-size: 0.8rem; border-radius: 4px; outline: none; }
        .notice-form-row input:focus { border-color: #00adb5; }
        .notice-sub-btn { background: #00adb5; border: none; color: #000; font-weight: bold; padding: 0 12px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; }

        /* Absolute Bottom Warning Banner (Unregistered Only) */
        #notice-warning-banner {
            display: none;
            background: #ff4a4a;
            color: #000;
            font-weight: bold;
            font-size: 0.8rem;
            text-align: center;
            padding: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* FULLSCREEN MAXIMIZE MODIFIERS */
        body.fullscreen-mode .left-content-area { display: none; }
        body.fullscreen-mode .sidebar-panel { width: 100%; }

        /* Utility Scrollbar styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00adb5; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1>Great Music</h1>
            <p>ALL DAY • EVERY DAY</p>
        </div>
        <div class="player-controls">
            <audio controls src="https://stream.banton.org/radio.mp3"></audio>
        </div>
    </header>

    <div class="main-content">
        
        <div class="left-content-area">
            <div class="info-card">
                <h3>Facebook Activity</h3>
                </div>
            <div class="info-card">
                <h3>Live Events & Adverts</h3>
                </div>
            <div class="info-card">
                <h3>Site Help and Emoji codes</h3>
                </div>
        </div>

        <div class="sidebar-panel" id="app-sidebar">
            
            <div class="sidebar-header">
                <span class="panel-title" id="panel-view-title">🎙️ Listener Lounge</span>
                <div class="nav-controls">
                    <button class="nav-btn" id="toggle-notice-btn" onclick="toggleNoticeBoardView()">📋 Noticeboard</button>
                    <button class="nav-btn" id="fullscreen-btn" onclick="toggleChatMaximized()">Maximize Chat</button>
                </div>
            </div>

            <div id="live-chat-view" class="view-container">
                <div class="chat-messages" id="chat-messages-box">
                    </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input-field" placeholder="Type a message inside lounge..." onkeydown="if(event.key === 'Enter') sendChatMessage()">
                    <button class="notice-sub-btn" onclick="sendChatMessage()">Send</button>
                </div>
            </div>

            <div id="noticeboard-view" class="view-container">
                <div class="notice-columns-wrapper">
                    
                    <div class="notice-column col-boss">
                        <div class="column-header"><span style="color:#ff4a4a">👑 Tella Boss Notices</span></div>
                        <div class="notice-feed" id="feed-boss"></div>
                        <div class="notice-input-form" id="boss-form">
                            <div class="notice-form-row">
                                <input type="text" id="input-boss" placeholder="Write boss directive...">
                                <button class="notice-sub-btn" onclick="submitNoticeUpdate('boss')">Post</button>
                            </div>
                        </div>
                    </div>

                    <div class="notice-column col-selectors">
                        <div class="column-header"><span style="color:#ffdd57">🎧 Selector Audio Feed</span></div>
                        <div class="notice-feed" id="feed-selectors"></div>
                        <div class="notice-input-form" id="selectors-form">
                            <div class="notice-form-row">
                                <input type="text" id="input-selectors" placeholder="Write selector schedule...">
                                <button class="notice-sub-btn" onclick="submitNoticeUpdate('selectors')">Post</button>
                            </div>
                        </div>
                    </div>

                    <div class="notice-column col-fambily">
                        <div class="column-header"><span style="color:#23d160">💚 Fambily Column</span></div>
                        <div class="notice-feed" id="feed-fambily"></div>
                        <div class="notice-input-form" id="fambily-form">
                            <div class="notice-form-row">
                                <input type="text" id="input-fambily" placeholder="Write group comment...">
                                <button class="notice-sub-btn" onclick="submitNoticeUpdate('fambily')">Post</button>
                            </div>
                        </div>
                    </div>

                </div>

                <div id="notice-warning-banner">YOU MUST BE REGISTERED TO COMMENT</div>
            </div>

        </div>
    </div>

    <script>
        // --- CLIENT SIDE STATE CACHING VARIABLES ---
        let supabaseClient = null;
        let loggedInUserProfile = null; 
        let isNoticeBoardOpen = false;

        // Initialize connection keys for database hooks
        (function initSupabaseConnection() {
            // Put your exact URL and Project API key string variables right here
            const SUPABASE_URL = "https://vegxferwmyuunwvvfqsf.supabase.co"; 
            const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZ3hmZXJ3bXl1dW53dnZmcXNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTgzOTY0MTIsImV4cCI6MjAzMzk3MjQxMn0.example_key";
            
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                loadProfileSession();
                listenNoticeBoardRealtime();
            }
        })();

        // Loads local storage identity to determine user security tier
        function loadProfileSession() {
            const localUsername = localStorage.getItem('chat_username');
            const localPasskey = localStorage.getItem('chat_passkey');

            if (!localUsername || !localPasskey) {
                loggedInUserProfile = null;
                renderNoticeBoardInputs(null);
                return;
            }

            // Verify identity against secured table
            supabaseClient
                .from('secured_profiles')
                .select('username, power_level, passkey')
                .eq('username', localUsername)
                .single()
                .then(({ data, error }) => {
                    if (!error && data && data.passkey === localPasskey) {
                        loggedInUserProfile = data;
                    } else {
                        loggedInUserProfile = null;
                    }
                    renderNoticeBoardInputs(loggedInUserProfile);
                });
        }

        // Toggles the structural view forms matching permissions exactly
        function renderNoticeBoardInputs(userProfile) {
            const warningBanner = document.getElementById('notice-warning-banner');
            
            if (!userProfile) {
                warningBanner.style.display = 'block';
                document.querySelectorAll('.notice-input-form').forEach(form => form.style.display = 'none');
                return;
            }

            // Instantly hide warning label string for authenticated tiers
            warningBanner.style.display = 'none';
            const pLevel = parseInt(userProfile.power_level || 0);

            // Selectively toggle text forms based on user rank values
            document.getElementById('boss-form').style.display = (pLevel >= 2) ? 'block' : 'none';
            document.getElementById('selectors-form').style.display = (pLevel >= 1) ? 'block' : 'none';
            document.getElementById('fambily-form').style.display = (pLevel >= 0) ? 'block' : 'none';
        }

        // --- NAVIGATION INTERACTION CONTROLS ---
        function toggleNoticeBoardView() {
            const chatView = document.getElementById('live-chat-view');
            const noticeView = document.getElementById('noticeboard-view');
            const mainTitle = document.getElementById('panel-view-title');
            const toggleBtn = document.getElementById('toggle-notice-btn');

            if (!isNoticeBoardOpen) {
                chatView.style.display = 'none';
                noticeView.style.display = 'flex';
                mainTitle.innerText = "📋 Central Notice Boards";
                toggleBtn.innerText = "❌ Exit Noticeboard";
                isNoticeBoardOpen = true;
                fetchNoticeBoardRecords(); 
            } else {
                noticeView.style.display = 'none';
                chatView.style.display = 'flex';
                mainTitle.innerText = "🎙️ Listener Lounge";
                toggleBtn.innerText = "📋 Noticeboard";
                isNoticeBoardOpen = false;
            }
        }

        function toggleChatMaximized() {
            const bodyEl = document.body;
            const fullBtn = document.getElementById('fullscreen-btn');
            
            if (!bodyEl.classList.contains('fullscreen-mode')) {
                bodyEl.classList.add('fullscreen-mode');
                fullBtn.innerText = "Exit Fullscreen";
            } else {
                bodyEl.classList.remove('fullscreen-mode');
                fullBtn.innerText = "Maximize Chat";
            }
        }

        // --- SUPABASE DATABASE NOTICE TRANSACTIONS ---
        function fetchNoticeBoardRecords() {
            supabaseClient
                .from('notice_board')
                .select('*')
                .order('created_at', { ascending: false })
                .then(({ data, error }) => {
                    if (!error && data) {
                        document.getElementById('feed-boss').innerHTML = "";
                        document.getElementById('feed-selectors').innerHTML = "";
                        document.getElementById('feed-fambily').innerHTML = "";

                        data.forEach(item => {
                            const container = document.getElementById(`feed-${item.board_type}`);
                            if (container) {
                                const card = document.createElement('div');
                                card.className = 'notice-card';
                                card.innerHTML = `<strong>${item.username}:</strong> <span>${item.notice_text}</span>`;
                                container.appendChild(card);
                            }
                        });
                    }
                });
        }

        function submitNoticeUpdate(boardType) {
            if (!loggedInUserProfile) return;
            
            const inputField = document.getElementById(`input-${boardType}`);
            const textValue = inputField.value.trim();
            if (!textValue) return;

            const currentLevel = parseInt(loggedInUserProfile.power_level || 0);
            if (boardType === 'boss' && currentLevel < 2) return;
            if (boardType === 'selectors' && currentLevel < 1) return;

            const noticePayload = {
                username: loggedInUserProfile.username,
                notice_text: textValue,
                board_type: boardType
            };

            supabaseClient
                .from('notice_board')
                .insert([noticePayload])
                .then(({ error }) => {
                    if (!error) {
                        inputField.value = ""; 
                    } else {
                        alert("Error saving announcement post: " + error.message);
                    }
                });
        }

        // Realtime Subscription Engine Connection Hook
        function listenNoticeBoardRealtime() {
            supabaseClient
                .channel('public:notice_board')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notice_board' }, payload => {
                    if (isNoticeBoardOpen) {
                        fetchNoticeBoardRecords();
                    }
                })
                .subscribe();
        }

        // Shell Stubs for your existing Chat functions to hook into
        function sendChatMessage() {
            const chatInput = document.getElementById('chat-input-field');
            if(!chatInput.value.trim()) return;
            chatInput.value = "";
        }
    </script>
</body>
</html>
