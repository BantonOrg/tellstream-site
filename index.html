<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellstream - Big John Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: url('/src/assets/sitebg1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }
        
        /* Fixed: Set a distinct height constraint so the layout layout doesn't shrink vertically */
        .player-card {
            background-image: url('/src/assets/header-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 140px;
            padding: 0px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .player-card h1 {
            color: #ff0055;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            font-size: 1.8rem;
            white-space: nowrap;
        }
        
        .fb-feed {
            flex: 1;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .chat-sidebar {
            width: 380px;
            background: rgba(24, 24, 24, 0.9);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(45, 45, 45, 0.5);
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: rgba(30, 30, 30, 0.8);
            border-bottom: 1px solid rgba(45, 45, 45, 0.5);
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff0055;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            background: rgba(36, 36, 36, 0.85);
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .msg .user {
            font-weight: bold;
            color: #00adb5;
            margin-bottom: 3px;
            font-size: 0.9rem;
        }
        
        .chat-input-area {
            padding: 15px;
            background: rgba(30, 30, 30, 0.9);
            border-top: 1px solid rgba(45, 45, 45, 0.5);
            display: flex; 
            gap: 10px;
        }
        
        .chat-input-area input {
            flex: 1;
            background: #2d2d2d;
            border: none;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            outline: none;
        }
        
        .chat-input-area button {
            background: #ff0055;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

            background: #e0004
