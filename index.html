<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellstream - Big John Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
        }
        
        body {
            background: url('/src/assets/sitebg1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }
        
        /* Fixed: Set a distinct height constraint so the layout layout doesn't shrink vertically */
        .player-card {
            background-image: url('/src/assets/header-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 140px;
            padding: 0px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        
        .player-card h1 {
            color: #ff0055;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            font-size: 1.8rem;
            white-space: nowrap;
        }
        
        .fb-feed {
            flex: 1;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .chat-sidebar {
            width: 380px;
            background: rgba(24, 24, 24, 0.9);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(45, 45, 45, 0.5);
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 20px;
            background: rgba(30, 30, 30, 0.8);
            border-bottom: 1px solid rgba(45, 45, 45, 0.5);
            font-weight: bold;
            font-size: 1.2rem;
            color: #ff0055;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .msg {
            background: rgba(36, 36, 36, 0.85);
            padding: 10px 14px;
            border-radius: 8px;
            line-height: 1.4;
            max-width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .msg .user {
            font-weight: bold;
            color: #00adb5;
            margin-bottom: 3px;
            font-size: 0.9rem;
        }
        
        .chat-input-area {
            padding: 15px;
            background: rgba(30, 30, 30, 0.9);
            border-top: 1px solid rgba(45, 45, 45, 0.5);
            display: flex; 
            gap: 10px;
        }
        
        .chat-input-area input {
            flex: 1;
            background: #2d2d2d;
            border: none;
            padding: 12px;
            border-radius: 6px;
            color: #fff;
            outline: none;
        }
        
        .chat-input-area button {
            background: #ff0055;
            border: none;
            color: white;
            padding: 0 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .chat-input-area button:hover {
            background: #e0004c;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="player-card">
            <h1>BIG JOHN LIVE</h1>
            <audio id="radioPlayer" src="https://a3.asurahosting.com/listen/tellstream/radio.mp3" controls preload="auto" style="width: 100%; max-width: 320px; margin: 0; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.6); border-radius: 8px;">
                Your browser does not support the audio element.
            </audio>
        </div>
        
        <div class="fb-feed">
            <h3>Facebook Activity Bridge</h3>
            <p style="color: #888; margin-top: 10px;">[Facebook Feed Widget Container Placeholder]</p>
        </div>
    </div>

    <div class="chat-sidebar">
        <div class="chat-header">🔊 Listener Lounge</div>
        <div class="chat-messages" id="chatBox"></div>
        
        <div class="chat-input-area">
            <input type="text" id="usernameInput" placeholder="Nickname" style="width: 80px; flex: none;">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <script src="/src/assets/emojis.js"></script>

    <script>
        const SUPABASE_URL = "https://vegwferwmyuunwvfqpsf.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZ3dmZXJ3bXl1dW53dmZxcHNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODU5NDQsImV4cCI6MjA5Nzk2MTk0NH0.7F3HUEY59BGE5phlD9AukhZzRa3Ied_ZT43j8YZeIy8";
        const supabase_db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const chatBox = document.getElementById('chatBox');
        const usernameInput = document.getElementById('usernameInput');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const audioPlayer = document.getElementById('radioPlayer');

        const imgBaseUrl = "https://tellstream-emojis.pages.dev/";

        audioPlayer.addEventListener('stalled', () => { recoverStream(); });
        audioPlayer.addEventListener('error', () => { recoverStream(); });

        function recoverStream() {
            const currentSrc = audioPlayer.src;
            if (!currentSrc) return;
            audioPlayer.src = "";
            audioPlayer.load();
            audioPlayer.src = currentSrc;
            audioPlayer.play().catch(err => console.log(err));
        }

        function appendMessage(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            
            let messageContent = escapeHTML(data.message);

            const codeRegex = /:([a-zA-Z0-9_-]+):/g;
            messageContent = messageContent.replace(codeRegex, (match, code) => {
                const lowerCode = code.toLowerCase();
                // Pulls safely from the window-scoped mapping file loaded above
                if (window.emojiMapping && window.emojiMapping[lowerCode]) {
                    return `<img src="${imgBaseUrl}${window.emojiMapping[lowerCode]}" alt="${code}" style="max-height: 48px; vertical-align: middle; margin: 2px; border-radius: 4px;">`;
                }
                return match;
            });

            msgDiv.innerHTML = `<div class="user">${escapeHTML(data.username)}</div><div>${messageContent}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            while (chatBox.children.length > 50) {
                chatBox.removeChild(chatBox.firstChild);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        async function loadMessages() {
            const { data } = await supabase_db.from('messages').select('*').order('id', { ascending: true }).limit(40);
            if (data) data.forEach(appendMessage);
        }

        supabase_db.channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', pattern: 'public', table: 'messages' }, payload => {
                appendMessage(payload.new);
            }).subscribe();

        async function sendMessage() {
            const user = usernameInput.value.trim() || 'Listener';
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            await supabase_db.from('messages').insert([{ username: user, message: text }]);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        loadMessages();
    </script>
</body>
</html>
