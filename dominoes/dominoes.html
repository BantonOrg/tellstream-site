<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellstream Dominoes - The Lounge Match</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-container">
            <div class="progress-wrapper">
                <span id="progress-text">Loading Lounge... 0%</span>
                <div class="progress-bar-outer">
                    <div id="progress-bar-inner"></div>
                </div>
            </div>
            
            <button id="action-btn" class="hidden-btn">Take a Seat</button>
        </div>
    </div>

    <main id="game-container" class="hidden-layout">
        <div id="lobby-view"></div>
        
        <div id="table-view" class="hidden-layout">
            <div class="game-table">
                <div class="table-center">
                    <div id="line-of-play"></div>
                </div>
                
                <div class="seat seat-bottom" id="seat-local-player"></div>
                <div class="seat seat-left" id="seat-player-2"></div>
                <div class="seat seat-top" id="seat-player-3"></div>
                <div class="seat seat-right" id="seat-player-4"></div>
            </div>
            
            <aside id="chat-mirror-panel"></aside>
        </div>
    </main>

    <script src="network.js"></script>
    <script src="game.js"></script>
</body>
</html>
