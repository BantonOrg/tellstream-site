<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tellstream Lounge Dominoes</title>
    
    <script>
        const allowedReferrer = "https://tellstream.banton.org/";
        if (!document.referrer || !document.referrer.startsWith(allowedReferrer)) {
            window.location.href = allowedReferrer;
        }
    </script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen" class="hidden">Loading Table...</div>

    <div id="game-table">
        <div class="match-board-container">
            <canvas id="track-canvas"></canvas>
            <div id="dominoes-layer"></div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
