<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TellStream Lounge Dominoes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="loading-screen" class="screen">
        <div class="loading-content">
            <button id="start-btn">Click to Enter Lounge</button>
        </div>
    </div>

    <div id="lobby-view" class="screen">
        <!-- Lobby layout content populates here dynamically -->
    </div>

    <div id="table-view" class="screen hidden-layout">
        <div id="game-table">
            <!-- Game layout container -->
        </div>
    </div>

    <div id="rotation-overlay">
        <div class="message">
            <h2>🔄 Please Rotate Your Device</h2>
            <p>This game requires landscape mode. If your screen doesn't turn, please ensure "Auto-Rotate" is enabled in your phone settings.</p>
        </div>
    </div>

    <!-- Correct Loading Sequence: UI & rendering foundation must load before network management -->
    <script src="game.js"></script>
    <script src="network.js"></script>

    <script>
        // Safely bind the entry engine once the DOM structure is fully parsed
        document.addEventListener("DOMContentLoaded", () => {
            const startButton = document.getElementById("start-btn");
            if (startButton) {
                startButton.addEventListener("click", () => {
                    // Hide the initial loading screen wrapper overlay
                    document.getElementById("loading-screen").style.display = "none";
                    // Initialize the network setup state loop
                    initNetwork();
                });
            }
        });
    </script>
</body>
</html>
