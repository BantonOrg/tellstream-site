<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Ludo</title>
  <link rel="stylesheet" href="/ludo/style.css">
  <script>
      // Security gate: Redirect to root if not logged in or active in other game
      (function() {
          const savedUser = localStorage.getItem('tellstream_active_user');
          const savedKey = localStorage.getItem('tellstream_key_' + savedUser);
          if (!savedUser || !savedKey) {
              alert("🔒 Access Denied: Please register and log in on the main Tellstream Lounge page first!");
              window.top.location.href = "/index.html";
              return;
          }
          const activeGame = localStorage.getItem('tellstream_active_game');
          if (activeGame && activeGame !== 'ludo') {
              alert("🔒 Access Denied: You are currently active in a Dominoes game. Please leave Dominoes first!");
              window.top.location.href = "/index.html";
          }
      })();
  </script>
</head>
<body>

<div id="menuScreen">
  <div class="panel">
    <h1>LUDO REALTIME</h1>
    <button id="createBtn" class="bigBtn">CREATE GAME</button>
    <input id="joinCode" maxlength="4" placeholder="ENTER CODE"/>
    <button id="joinBtn" class="bigBtn">JOIN GAME</button>
  </div>
</div>

<div id="gameScreen" class="hidden">
  <div id="topBar" class="hidden">
    <div id="roomInfo">Connecting...</div>
  </div>

  <div id="boardWrapper">
    <div id="board" class="theme-classic">
      <div class="player-details green" id="details-green">GREEN: Connecting...</div>
      
      <div class="player-details yellow" id="details-yellow">
        <span>YELLOW: Connecting...</span>
        <div class="system-controls-group">
          <span id="roomDisplay">ROOM: ----</span>
          <button id="optionsBtn">⚙️ Settings</button>
          <button id="exitLudoBtn" style="background:#ff3333; border:none; color:white; padding:4px 10px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:0.75rem; margin-left:8px;">Exit Game</button>
          
          <!-- Custom Radio Remote Controls -->
          <div class="remote-music-controls" style="display: inline-flex; align-items: center; gap: 8px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 12px; margin-left: 12px; vertical-align: middle;">
              <span style="font-size: 0.75rem; font-weight: bold; color: #ffdd1a; letter-spacing: 0.5px; font-family: sans-serif;">📻 RADIO:</span>
              <button id="remote-play-pause-btn" style="background: transparent; border: none; color: #fff; font-size: 0.85rem; cursor: pointer; padding: 2px 5px; outline: none; transition: transform 0.1s;">⏸️</button>
              <input type="range" id="remote-volume-slider" min="0" max="1" step="0.05" value="0.5" style="width: 60px; height: 4px; accent-color: #00adb5; cursor: pointer; vertical-align: middle;">
          </div>
          <div class="dropdownContent">
            <label>Sound <input type="checkbox" id="soundToggle"></label>
            <label>Theme 
              <select id="themeSelect">
                <option value="classic">Classic Table</option>
                <option value="futuristic">Futuristic Board</option>
              </select>
            </label>
          </div>
        </div>
      </div>

      <div class="player-details red" id="details-red">RED: Connecting...</div>
      <div class="player-details blue" id="details-blue">BLUE: Connecting...</div>

      <div id="yard-controls-container" style="display: contents;"></div>
    </div>
  </div>
</div>

<audio id="localRadioPlayer" src="https://a3.asurahosting.com/listen/tellstream/radio.mp3" preload="none"></audio>
<script type="module" src="/ludo/game.js"></script>
<script>
    const radioChan = new BroadcastChannel('tellstream_radio_control');
    const playPauseBtn = document.getElementById('remote-play-pause-btn');
    const volSlider = document.getElementById('remote-volume-slider');
    const localPlayer = document.getElementById('localRadioPlayer');
    
    let isRemote = (window.self !== window.top); // True if inside iframe
    let currentRadioState = 'paused';

    // Check if there is an active homepage player in another tab
    if (!isRemote) {
        radioChan.postMessage({ action: 'ping' });
        setTimeout(() => {
            if (currentRadioState === 'paused' && localPlayer.paused) {
                console.log("No homepage player detected. Switched to local player.");
            }
        }, 600);
    }

    if (playPauseBtn && volSlider) {
        playPauseBtn.onclick = () => {
            if (currentRadioState === 'playing') {
                if (isRemote) {
                    radioChan.postMessage({ action: 'pause' });
                } else {
                    localPlayer.pause();
                }
                playPauseBtn.innerText = '▶️';
                currentRadioState = 'paused';
            } else {
                if (isRemote) {
                    radioChan.postMessage({ action: 'play' });
                } else {
                    localPlayer.play().catch(e => console.log("Local play blocked:", e));
                }
                playPauseBtn.innerText = '⏸️';
                currentRadioState = 'playing';
            }
        };
        
        volSlider.oninput = () => {
            const vol = parseFloat(volSlider.value);
            if (isRemote) {
                radioChan.postMessage({ action: 'volume', value: vol });
            } else {
                localPlayer.volume = vol;
            }
        };
    }

    // Listen for channel messages
    radioChan.onmessage = (event) => {
        if (event.data.action === 'pong') {
            isRemote = true; // Homepage confirmed open in another tab
        }
        if (event.data.state) {
            currentRadioState = event.data.state;
            playPauseBtn.innerText = currentRadioState === 'playing' ? '⏸️' : '▶️';
        }
        if (typeof event.data.volume !== 'undefined') {
            volSlider.value = event.data.volume;
            if (!isRemote) localPlayer.volume = event.data.volume;
        }
    };
</script>
</body>
</html>
