<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Schedule Automation Test Track</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header-dashboard {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .header-banner {
            background: linear-gradient(135deg, #0056b3, #00adb5);
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 6px;
            margin-bottom: 15px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            background: #2e2e2e;
            padding: 10px;
            border-radius: 6px;
        }
        input, select, button {
            background: #111;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
        }
        button {
            cursor: pointer;
            transition: background 0.2s;
        }
        button.perm-btn { border-color: #ffdd1a; color: #ffdd1a; }
        button.perm-btn:hover { background: rgba(255,221,26,0.1); }
        button.temp-btn { border-color: #ff3333; color: #ff3333; }
        button.temp-btn:hover { background: rgba(255,51,51,0.1); }
        
        .columns-container {
            display: flex;
            gap: 20px;
        }
        .col-3 {
            flex: 1;
            background: #222;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-height: 400px;
        }
        .col-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #00adb5;
            border-bottom: 2px solid #333;
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 500px;
            overflow-y: auto;
        }
        .schedule-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            background: #2d2d2d;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.95rem;
        }
        .schedule-row.active {
            background: rgba(0, 230, 118, 0.15);
            border-left: 4px solid #00E676;
            font-weight: bold;
        }
        .schedule-row.has-temp {
            border-right: 4px solid #ff3333;
        }
        .badge {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
        .badge-perm { background: #555; color: #fff; }
        .badge-temp { background: #ff3333; color: #fff; }
    </style>
</head>
<body>

    <div class="header-dashboard">
        <div class="header-banner" id="headerStreamDisplay">
            Automated Banner: Loading...
        </div>
        
        <div class="control-row">
            <span>⏱️ Current Sim Minute: <strong id="clockDisplay" style="color:#00E676; font-size:1.2rem;">1</strong>/20</span>
            <div style="margin-left: auto; display: flex; gap: 10px;">
                <input type="number" id="inputTargetMinute" placeholder="Minute (1-20)" min="1" max="20" style="width: 100px;">
                <input type="text" id="inputShowData" placeholder="Show Name Data">
                <button class="perm-btn" onclick="commitChange(true)">💾 Commit Perm</button>
                <button class="temp-btn" onclick="commitChange(false)">🚨 Commit Temp</button>
            </div>
        </div>
    </div>

    <div class="columns-container">
        
        <div class="col-3" style="opacity: 0.5;">
            <div class="col-title">📰 Site News (Dummy Column)</div>
            <p style="font-size:0.85rem; color:#888; font-style:italic;">This column remains static during simulation tests.</p>
        </div>
        
        <div class="col-3">
            <div class="col-title">🔥 Live Events & Calendar Test Feed</div>
            <div class="schedule-list" id="scheduleViewDeck"></div>
        </div>
        
        <div class="col-3" style="opacity: 0.5;">
            <div class="col-title">💡 Help & Emojis (Dummy Column)</div>
            <p style="font-size:0.85rem; color:#888; font-style:italic;">This column remains static during simulation tests.</p>
        </div>
        
    </div>

    <script>
        // 1. Initialize data arrays (1 week rotation scaled to a 20-minute concrete track)
        let masterSchedule = [];
        let temporaryOverrides = {}; // Map storage using minute numbers as lookups

        for (let i = 1; i <= 20; i++) {
            masterSchedule.push({
                minuteNum: i,
                displayFormat: `${i}.${i}.${i}`,
                showName: "tellstream"
            });
        }

        let currentSimulatedMinute = 1;

        // 2. The Core Processing & Automation Loop Engine
        function runAutomationSequence() {
            // Update clock element readout
            document.getElementById('clockDisplay').innerText = currentSimulatedMinute;

            // Determine active slot target mapping rule: Check Temp Overrides first, then baseline Concrete array
            let activeShowName = "tellstream";
            if (temporaryOverrides[currentSimulatedMinute]) {
                activeShowName = temporaryOverrides[currentSimulatedMinute];
            } else {
                const targetRow = masterSchedule.find(row => row.minuteNum === currentSimulatedMinute);
                if (targetRow) activeShowName = targetRow.showName;
            }

            // Automate the header update simulation trigger rule
            const banner = document.getElementById('headerStreamDisplay');
            if (activeShowName === "tellstream") {
                banner.innerText = "TELLSTREAM NON STOP";
                banner.style.background = "linear-gradient(135deg, #0056b3, #00adb5)";
            } else {
                banner.innerText = `${activeShowName} - LIVE`;
                banner.style.background = "linear-gradient(135deg, #ff3333, #ffdd1a)";
            }

            // Clean up temporary overrides automatically immediately upon expiration
            // If the code loop just processed an active temporary item, strip it out once it exits its time box
            if (temporaryOverrides[currentSimulatedMinute]) {
                // Deletes the scratchpad record so when the 20-minute cycle loops back, it's restored cleanly to baseline master rules
                delete temporaryOverrides[currentSimulatedMinute];
            }

            renderScheduleTimeline();

            // Advance high-speed clock forward. Loops back seamlessly at 20.
            currentSimulatedMinute++;
            if (currentSimulatedMinute > 20) {
                currentSimulatedMinute = 1;
            }
        }

        // 3. Render Visual UI View Row Format
        function renderScheduleTimeline() {
            const container = document.getElementById('scheduleViewDeck');
            container.innerHTML = "";

            masterSchedule.forEach(item => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "schedule-row";
                
                // Track active state formatting parameters
                if (item.minuteNum === currentSimulatedMinute - 1 || (currentSimulatedMinute === 1 && item.minuteNum === 20)) {
                    rowDiv.classList.add('active');
                }

                // Identify data overrides live
                let displayShowName = item.showName;
                let badgeHtml = `<span class="badge badge-perm">PERM</span>`;

                if (temporaryOverrides[item.minuteNum]) {
                    displayShowName = temporaryOverrides[item.minuteNum];
                    badgeHtml = `<span class="badge badge-temp">TEMP OVERRIDE</span>`;
                    rowDiv.classList.add('has-temp');
                }

                rowDiv.innerHTML = `
                    <span>⏱️ ${item.displayFormat} — <strong>${displayShowName}</strong></span>
                    ${badgeHtml}
                `;
                container.appendChild(rowDiv);
            });
        }

        // 4. Input Submission Logic Parser
        function commitChange(isPermanent) {
            const minuteInput = document.getElementById('inputTargetMinute').value;
            const dataInput = document.getElementById('inputShowData').value.trim();

            const targetMin = parseInt(minuteInput, 10);
            if (isNaN(targetMin) || targetMin < 1 || targetMin > 20) {
                alert("Please declare a valid simulation slot frame number between 1 and 20.");
                return;
            }
            if (!dataInput) {
                alert("Please include text data values inside the show field placeholder container box.");
                return;
            }

            if (isPermanent) {
                // Update the concrete master structure directly
                const targetRow = masterSchedule.find(row => row.minuteNum === targetMin);
                if (targetRow) targetRow.showName = dataInput;
            } else {
                // Injects a one-off rule into the scratchpad matrix
                temporaryOverrides[targetMin] = dataInput;
            }

            // Instantly render changes so the table data matrix displays updates
            renderScheduleTimeline();
            
            // Clear entry logs
            document.getElementById('inputTargetMinute').value = "";
            document.getElementById('inputShowData').value = "";
        }

        // 5. Fire Engine Up. 1 High Speed Simulated Minute = 3 Real Time Seconds.
        renderScheduleTimeline();
        runAutomationSequence(); 
        setInterval(runAutomationSequence, 3000);
    </script>
</body>
</html>
